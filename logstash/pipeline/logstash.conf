input {
  file {
    path => "/usr/share/logstash/logs/application.log"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/.sincedb_app"
    type => "app"
    codec => multiline {
      pattern => "^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d{3}"
      negate => true
      what => "previous"
    }
  }

  file {
    path => "/usr/share/logstash/logs/shop_db.log"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/.sincedb_shop_db"
    type => "shop_db"
    codec => multiline {
      pattern => "^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}"
      negate => true
      what => "previous"
    }
  }

  file {
    path => "/usr/share/logstash/logs/keycloak.log"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/.sincedb_keycloak"
    type => "keycloak"
    codec => multiline {
      pattern => "^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}"
      negate => true
      what => "previous"
    }
  }

  file {
    path => "/usr/share/logstash/logs/keycloak-db.log"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/.sincedb_keycloak_db"
    type => "keycloak-db"
    codec => multiline {
      pattern => "^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}"
      negate => true
      what => "previous"
    }
  }

  file {
    path => "/usr/share/logstash/logs/redis.log"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/.sincedb_redis"
    type => "redis"
  }
}

filter {
  if [type] == "app" {
    dissect {
      mapping => {
        "message" => "%{timestamp} [%{correlation_id}] [%{thread}] %{loglevel} %{logger} - %{log_message}"
      }
    }

    if "_dissectfailure" in [tags] {
      mutate {
        add_field => { "log_message" => "%{message}" }
        remove_tag => ["_dissectfailure"]
      }
    } else {
      mutate {
        strip => ["loglevel"]
      }
      date {
        match => [ "timestamp", "yyyy-MM-dd HH:mm:ss.SSS" ]
        target => "@timestamp"
        remove_field => [ "timestamp" ]
      }
    }

    mutate {
      add_field => { "service" => "app" }
    }

    if [log_message] =~ "Batch generation failed" {
      grok {
        match => {
          "log_message" => "Batch generation failed: %{INT:api_status_code}, message='%{DATA:api_error_message}', url='%{DATA:api_url}'"
        }
      }

      if [api_url] {
        mutate {
          gsub => [
            "api_url", "TrustedClientToken=[^&]+", "TrustedClientToken=REDACTED",
            "api_url", "Sec-MS-GEC=[^&]+", "Sec-MS-GEC=REDACTED"
          ]
        }
      }

      mutate {
        gsub => [
          "log_message", "TrustedClientToken=[^&']+", "TrustedClientToken=REDACTED",
          "log_message", "Sec-MS-GEC=[^&']+", "Sec-MS-GEC=REDACTED"
        ]
      }
    }
  }

  else if [type] == "shop_db" or [type] == "keycloak-db" {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:timestamp} %{WORD:tz} \[%{INT:pid}\] %{WORD:loglevel}:  %{GREEDYDATA:log_message}"
      }
    }

    if "_grokparsefailure" in [tags] {
      mutate {
        add_field => { "log_message" => "%{message}" }
        remove_tag => ["_grokparsefailure"]
      }
    } else {
      date {
        match => [ "timestamp", "yyyy-MM-dd HH:mm:ss.SSS", "yyyy-MM-dd HH:mm:ss" ]
        target => "@timestamp"
        remove_field => [ "timestamp" ]
      }
    }

    mutate {
      add_field => { "service" => "%{type}" }
    }
  }

  else if [type] == "keycloak" {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:loglevel} +\[%{NOTSPACE:logger}\] \(%{NOTSPACE:thread}\) %{GREEDYDATA:log_message}"
      }
    }

    if "_grokparsefailure" in [tags] {
      mutate {
        add_field => { "log_message" => "%{message}" }
        remove_tag => ["_grokparsefailure"]
      }
    } else {
      mutate {
        strip => ["loglevel"]
      }
      date {
        match => [ "timestamp", "yyyy-MM-dd HH:mm:ss,SSS" ]
        target => "@timestamp"
        remove_field => [ "timestamp" ]
      }
    }

    mutate {
      add_field => { "service" => "keycloak" }
    }
  }

  else if [type] == "redis" {
    grok {
      match => {
        "message" => "%{POSINT:pid}:%{NOTSPACE:role} %{MONTHDAY:day} %{MONTH:month} %{YEAR:year} %{TIME:time} %{NOTSPACE:loglevel_char} %{GREEDYDATA:log_message}"
      }
    }

    if "_grokparsefailure" in [tags] {
      mutate {
        add_field => { "log_message" => "%{message}" }
        remove_tag => ["_grokparsefailure"]
      }
    } else {
      mutate {
        add_field => { "timestamp" => "%{day} %{month} %{year} %{time}" }
      }
      date {
        match => [ "timestamp", "dd MMM yyyy HH:mm:ss.SSS", "dd MMM yyyy HH:mm:ss" ]
        target => "@timestamp"
        remove_field => [ "timestamp", "day", "month", "year", "time" ]
      }
      if [loglevel_char] == "." {
        mutate { add_field => { "loglevel" => "DEBUG" } }
      } else if [loglevel_char] == "-" {
        mutate { add_field => { "loglevel" => "VERBOSE" } }
      } else if [loglevel_char] == "*" {
        mutate { add_field => { "loglevel" => "INFO" } }
      } else if [loglevel_char] == "#" {
        mutate { add_field => { "loglevel" => "WARN" } }
      }
      mutate {
        remove_field => ["loglevel_char"]
      }
    }

    mutate {
      add_field => { "service" => "redis" }
    }
  }

  if ![service] {
    mutate {
      add_field => { "service" => "general" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "%{service}-logs-%{+YYYY.MM.dd}"
  }

  stdout {
    codec => rubydebug
  }
}
