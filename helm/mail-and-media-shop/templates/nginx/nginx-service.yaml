apiVersion: v1
kind: Service
metadata:
  name: {{ include "mail-and-media-shop.fullname" . }}-nginx
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mail-and-media-shop.labels" . | nindent 4 }}
    app.kubernetes.io/component: nginx
spec:
  type: NodePort
  selector:
    app.kubernetes.io/component: nginx
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
      nodePort: 30090
