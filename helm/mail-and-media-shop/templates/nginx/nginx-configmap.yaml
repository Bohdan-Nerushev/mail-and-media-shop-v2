apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mail-and-media-shop.fullname" . }}-nginx-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mail-and-media-shop.labels" . | nindent 4 }}
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }
    http {
        upstream app_backend {
            server {{ include "mail-and-media-shop.fullname" . }}:{{ .Values.app.service.port }};
        }
        server {
            listen 80;
            location /healthz {
                access_log off;
                return 200 "OK\n";
            }
            location / {
                proxy_pass http://app_backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }
        }
    }
