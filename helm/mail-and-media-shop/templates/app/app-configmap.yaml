apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mail-and-media-shop.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mail-and-media-shop.labels" . | nindent 4 }}
data:
  APP_ENV: {{ .Values.app.env.APP_ENV | quote }}
  SPRING_PROFILES_ACTIVE: {{ .Values.app.env.SPRING_PROFILES_ACTIVE | quote }}
