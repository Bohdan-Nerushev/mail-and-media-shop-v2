    metadata:
      labels:
        app.kubernetes.io/component: postgres-exporter-shop
    spec:
      containers:
        - name: postgres-exporter
          image: {{ .Values.postgresExporterShop.image | quote }}
          env:
            - name: DATA_SOURCE_NAME
              value: "postgresql://{{ .Values.shopdb.auth.username }}:{{ .Values.shopdb.auth.password }}@{{ include "mail-and-media-shop.shopdb.svcName" . }}:5432/{{ .Values.shopdb.auth.database }}?sslmode=disable"
          ports:
            - name: metrics
              containerPort: 9187
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mail-and-media-shop.fullname" . }}-postgres-exporter-shop
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - port: 9187
      targetPort: 9187
  selector:
    app.kubernetes.io/component: postgres-exporter-shop
{{- end }}

