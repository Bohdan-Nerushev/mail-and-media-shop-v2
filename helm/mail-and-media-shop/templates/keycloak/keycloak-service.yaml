apiVersion: v1
kind: Service
metadata:
  name: {{ include "mail-and-media-shop.keycloak.svcName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mail-and-media-shop.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: keycloak
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
