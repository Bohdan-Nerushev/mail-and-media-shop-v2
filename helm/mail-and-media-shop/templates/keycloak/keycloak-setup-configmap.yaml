apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mail-and-media-shop.fullname" . }}-keycloak-setup-scripts
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mail-and-media-shop.labels" . | nindent 4 }}
data:
  2_keycloak_api_setup.sh: |
{{ .Files.Get "scripts/2_keycloak_api_setup.sh" | indent 4 }}
  env_loader.sh: |
{{ .Files.Get "scripts/env_loader.sh" | indent 4 }}
  utils.sh: |
{{ .Files.Get "scripts/utils.sh" | indent 4 }}
