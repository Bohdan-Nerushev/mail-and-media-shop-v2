apiVersion: v1
kind: Service
metadata:
  name: {{ include "mail-and-media-shop.shopdb.svcName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mail-and-media-shop.labels" . | nindent 4 }}
    app.kubernetes.io/component: shop-db
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: shop-db
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: db
      port: 5432
      targetPort: 5432
      protocol: TCP
