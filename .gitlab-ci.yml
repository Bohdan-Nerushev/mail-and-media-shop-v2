stages:
  - test
  - e2e-test
  - package
  - deploy
  - deploy-live

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  IMAGE_TAG: "${CI_COMMIT_SHORT_SHA}"
  SSH_CMD: "ssh ${SSH_USER}@${SSH_HOST} -o StrictHostKeyChecking=no"
  SCP_CMD: "scp -o StrictHostKeyChecking=no -r helm/mail-and-media-shop ${SSH_USER}@${SSH_HOST}:~/mam-deployments/"
  
before_script:
  - source scripts/utils.sh
  - source scripts/env_loader.sh

cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .m2/repository/
    - e2e_tests/venv/

unit_test_job:
  stage: test
  variables:
    REDIS_HOST: redis
  services:
    - name: redis:7.0-alpine
      alias: redis
  script:
    - mvn clean install
  tags:
    - maven

e2e_test_job:
  stage: e2e-test
  script:
    - chmod +x scripts/1_docker-e2e-setup.sh
    - chmod +x scripts/3_e2e-test-runner.sh
    - ./scripts/1_docker-e2e-setup.sh
    - ./scripts/3_e2e-test-runner.sh
  artifacts:
    when: always
    paths:
      - logs/
  tags:
    - maven

package_job:
  stage: package
  dependencies:
    - unit_test_job
    - e2e_test_job
  script:
    - $SSH_CMD "rm -rf ~/mam-deployments/mail-and-media-shop"
    - docker build -t ${IMAGE_NAME}:${IMAGE_TAG} .
    - docker save -o ${IMAGE_NAME}-${IMAGE_TAG}.tar ${IMAGE_NAME}:${IMAGE_TAG}
    - rsync -avz -e "ssh -o StrictHostKeyChecking=no" ${IMAGE_NAME}-${IMAGE_TAG}.tar ${SSH_USER}@${SSH_HOST}:~/
    - $SSH_CMD "if command -v docker >/dev/null; then docker load -i ~/${IMAGE_NAME}-${IMAGE_TAG}.tar; fi"
    - $SSH_CMD "if command -v k3s >/dev/null; then sudo k3s ctr images import ~/${IMAGE_NAME}-${IMAGE_TAG}.tar; fi"
    - $SSH_CMD "rm -f ~/${IMAGE_NAME}-${IMAGE_TAG}.tar"
    - rm ${IMAGE_NAME}-${IMAGE_TAG}.tar
  tags:
    - maven

deploy_dev:
  stage: deploy
  dependencies:
    - package_job
  environment:
    name: dev
    url: https://${SSH_HOST}/dev
  script:
    - $SSH_CMD "mkdir -p ~/mam-deployments"
    - $SCP_CMD
    - |
      $SSH_CMD "
        export KUBECONFIG=/etc/rancher/k3s/k3s.yaml && \
        cd ~/mam-deployments/mail-and-media-shop && \
        helm dependency build && \
        helm upgrade --install mam-dev . \
          -f values-dev.yaml \
          --set app.image.tag=${IMAGE_TAG} \
          --namespace mam-dev \
          --wait --timeout 300s
      "
  when: manual
  tags:
    - maven

deploy_qa:
  stage: deploy
  dependencies:
    - package_job
  environment:
    name: qa
    url: https://${SSH_HOST}/qa
  script:
    - $SSH_CMD "mkdir -p ~/mam-deployments"
    - $SCP_CMD
    - |
      $SSH_CMD "
        export KUBECONFIG=/etc/rancher/k3s/k3s.yaml && \
        cd ~/mam-deployments/mail-and-media-shop && \
        helm dependency build && \
        helm upgrade --install mam-qa . \
          -f values-qa.yaml \
          --set app.image.tag=${IMAGE_TAG} \
          --namespace mam-qa \
          --wait --timeout 300s
      "
  when: manual
  tags:
    - maven

deploy_live:
  stage: deploy-live
  dependencies:
    - package_job
  environment:
    name: live
    url: https://${SSH_HOST}
  script:
    - $SSH_CMD "mkdir -p ~/mam-deployments"
    - $SCP_CMD
    - |
      $SSH_CMD "
        export KUBECONFIG=/etc/rancher/k3s/k3s.yaml && \
        cd ~/mam-deployments/mail-and-media-shop && \
        helm dependency build && \
        helm upgrade --install mam-live . \
          -f values-live.yaml \
          --set app.image.tag=${IMAGE_TAG} \
          --namespace mam-live \
          --wait --timeout 300s
      "
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
  when: manual
  allow_failure: false
  tags:
    - maven
