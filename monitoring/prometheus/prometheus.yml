global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: local

scrape_configs:
  - job_name: spring-boot
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['app:8090']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: keycloak
    metrics_path: /metrics
    static_configs:
      - targets: ['keycloak:9000']

  - job_name: keycloak-business
    metrics_path: /realms/mail-and-media-shop-realm/metrics
    static_configs:
      - targets: ['keycloak:8090']

  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: postgres-shop
    static_configs:
      - targets: ['postgres-exporter-shop:9187']
    relabel_configs:
      - target_label: db_instance
        replacement: shop_db

  - job_name: postgres-keycloak
    static_configs:
      - targets: ['postgres-exporter-keycloak:9187']
    relabel_configs:
      - target_label: db_instance
        replacement: keycloak_db

  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']