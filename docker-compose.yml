services:

  # Spring Boot application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${APP_IMAGE_NAME}
    container_name: ${APP_CONTAINER_NAME}
    depends_on:
      shop_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${APP_PORT}:8090"
    environment:
      - DB_URL=jdbc:postgresql://${SHOP_DB_CONTAINER_NAME}:5432/${SHOP_DB_NAME}
      - DB_USERNAME=${SHOP_DB_USER}
      - DB_PASSWORD=${SHOP_DB_PASSWORD}
      - REDIS_HOST=redis

  # Shop database
  shop_db:
    image: postgres:${POSTGRES_IMAGE_VERSION}
    container_name: ${SHOP_DB_CONTAINER_NAME}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${SHOP_DB_USER} -d ${SHOP_DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: ${SHOP_DB_NAME}
      POSTGRES_USER: ${SHOP_DB_USER}
      POSTGRES_PASSWORD: ${SHOP_DB_PASSWORD}
    ports:
      - "${SHOP_DB_PORT}:5432"
    volumes:
      - shop_db_data:/var/lib/postgresql/data

  # Redis cache
  redis:
    image: redis:7.0-alpine
    container_name: redis_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: [ "redis-server", "--appendonly", "yes" ]
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # SonarQube database
  sonarqube_db:
    image: postgres:${SONAR_DB_IMAGE_VERSION}
    container_name: ${SONAR_DB_CONTAINER_NAME}
    environment:
      POSTGRES_USER: ${SONAR_DB_USER}
      POSTGRES_PASSWORD: ${SONAR_DB_PASSWORD}
      POSTGRES_DB: ${SONAR_DB_NAME}
    volumes:
      - sonarqube_postgres_data:/var/lib/postgresql/data

  # SonarQube server
  sonarqube:
    image: sonarqube:${SONAR_IMAGE_VERSION}
    container_name: ${SONAR_CONTAINER_NAME}
    depends_on:
      - sonarqube_db
    ports:
      - "${SONAR_PORT}:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://${SONAR_DB_CONTAINER_NAME}:5432/${SONAR_DB_NAME}
      SONAR_JDBC_USERNAME: ${SONAR_DB_USER}
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD}
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs

volumes:
  shop_db_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonarqube_postgres_data:
  redis_data:
