services:
  keycloak-db:
    image: postgres:15-alpine
    container_name: keycloak-db
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    ports:
      - "${KEYCLOAK_DB_PORT}:5432"
    networks:
      - monitoring
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
      - ./logs:/var/log/postgresql
    command:
      - postgres
      - -c
      - logging_collector=on
      - -c
      - log_destination=stderr
      - -c
      - log_directory=/var/log/postgresql
      - -c
      - log_filename=keycloak-db.log
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER} -d ${KEYCLOAK_DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    container_name: keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}

      KC_HTTP_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_PORT: ${KEYCLOAK_PORT}
      KC_HEALTH_ENABLED: "true"
      KC_LOG: "console,file"
      KC_LOG_FILE: "/opt/keycloak/data/log/keycloak.log"
    ports:
      - "${KEYCLOAK_PORT}:8080"
    networks:
      - monitoring
    volumes:
      - ./logs:/opt/keycloak/data/log
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/live HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q 'UP'" ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  keycloak-setup:
    image: docker:cli
    container_name: keycloak-setup
    depends_on:
      keycloak:
        condition: service_healthy
      keycloak-db:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts:/scripts
    environment:
      KC_URL: "http://keycloak:8080"
      KC_ADMIN_USER: ${KC_BOOTSTRAP_ADMIN_USERNAME}
      KC_ADMIN_PASS: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
      KC_REALM: ${KC_REALM}
      KC_CLIENT_ID: ${KC_CLIENT_ID}
      KC_CLIENT_SECRET: ${KC_CLIENT_SECRET}
      KEYCLOAK_DB_USER: ${KEYCLOAK_DB_USER}
      KEYCLOAK_DB_NAME: ${KEYCLOAK_DB_NAME}
      USER_NAME: ${USER_NAME}
      USER_EMAIL: ${USER_EMAIL}
      USER_PASSWORD: ${USER_PASSWORD}
    networks:
      - monitoring
    entrypoint: >
      sh -c " apk add --no-cache bash curl jq postgresql-client && bash /scripts/2_keycloak_api_setup.sh "
    # Shop database
  shop_db:
    image: postgres:${POSTGRES_IMAGE_VERSION}
    container_name: ${SHOP_DB_CONTAINER_NAME}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${SHOP_DB_USER} -d ${SHOP_DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: ${SHOP_DB_NAME}
      POSTGRES_USER: ${SHOP_DB_USER}
      POSTGRES_PASSWORD: ${SHOP_DB_PASSWORD}
    ports:
      - "${SHOP_DB_PORT}:5432"
    networks:
      - monitoring
    volumes:
      - shop_db_data:/var/lib/postgresql/data
      - ./logs:/var/log/postgresql
    command:
      - postgres
      - -c
      - logging_collector=on
      - -c
      - log_destination=stderr
      - -c
      - log_directory=/var/log/postgresql
      - -c
      - log_filename=shop_db.log

  # Redis cache
  redis:
    image: redis:7.0-alpine
    container_name: redis_cache
    ports:
      - "6379:6379"
    networks:
      - monitoring
    volumes:
      - redis_data:/data
      - ./logs:/var/log/redis
    command: [ "redis-server", "--appendonly", "yes", "--logfile", "/var/log/redis/redis.log" ]
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # SonarQube server
  sonarqube:
    image: sonarqube:${SONAR_IMAGE_VERSION}
    container_name: ${SONAR_CONTAINER_NAME}
    depends_on:
      - sonarqube_db
    ports:
      - "${SONAR_PORT}:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://${SONAR_DB_CONTAINER_NAME}:5432/${SONAR_DB_NAME}
      SONAR_JDBC_USERNAME: ${SONAR_DB_USER}
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD}
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs

  # SonarQube database
  sonarqube_db:
    image: postgres:${SONAR_DB_IMAGE_VERSION}
    container_name: ${SONAR_DB_CONTAINER_NAME}
    environment:
      POSTGRES_USER: ${SONAR_DB_USER}
      POSTGRES_PASSWORD: ${SONAR_DB_PASSWORD}
      POSTGRES_DB: ${SONAR_DB_NAME}
    volumes:
      - sonarqube_postgres_data:/var/lib/postgresql/data
  # Spring Boot application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${APP_IMAGE_NAME}
    container_name: ${APP_CONTAINER_NAME}
    restart: always
    ports:
      - "${APP_PORT:-8090}:8090"
    networks:
      - monitoring
    volumes:
      - ./logs:/app/logs
    depends_on:
      shop_db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak-setup:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:8090/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATASOURCE_URL: jdbc:postgresql://shop_db:5432/${SHOP_DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${SHOP_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${SHOP_DB_PASSWORD}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/${KC_REALM}

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - monitoring
    depends_on:
      app:
        condition: service_healthy
      node-exporter:
        condition: service_started

  node-exporter:
    image: quay.io/prometheus/node-exporter:latest
    container_name: node-exporter
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    pid: host
    restart: unless-stopped
    volumes:
      - '/proc:/host/proc:ro'
      - '/sys:/host/sys:ro'
      - '/:/rootfs:ro'
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:3.1.0
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    networks:
      - monitoring

  alloy:
    image: grafana/alloy:v1.3.0
    container_name: alloy
    restart: unless-stopped
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    ports:
      - "12345:12345"
    volumes:
      - ./monitoring/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - monitoring
    depends_on:
      - loki

  postgres-exporter-shop:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter-shop
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://${SHOP_DB_USER}:${SHOP_DB_PASSWORD}@shop_db:5432/${SHOP_DB_NAME}?sslmode=disable
      PG_EXPORTER_EXTEND_QUERY_PATH: /etc/postgres_exporter/queries.yml
    ports:
      - "9187:9187"
    volumes:
      - ./monitoring/postgres_exporter/queries.yml:/etc/postgres_exporter/queries.yml:ro
    networks:
      - monitoring
    depends_on:
      shop_db:
        condition: service_healthy

  postgres-exporter-keycloak:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter-keycloak
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://${KEYCLOAK_DB_USER}:${KEYCLOAK_DB_PASSWORD}@keycloak-db:5432/${KEYCLOAK_DB_NAME}?sslmode=disable
      PG_EXPORTER_EXTEND_QUERY_PATH: /etc/postgres_exporter/queries.yml
    ports:
      - "9188:9187"
    volumes:
      - ./monitoring/postgres_exporter/queries.yml:/etc/postgres_exporter/queries.yml:ro
    networks:
      - monitoring
    depends_on:
      keycloak-db:
        condition: service_healthy

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis_cache:6379
    ports:
      - "9121:9121"
    networks:
      - monitoring
    depends_on:
      redis:
        condition: service_healthy

  logstash:
    image: docker.elastic.co/logstash/logstash:9.4.2
    container_name: logstash
    environment:
      LS_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./logs:/usr/share/logstash/logs:ro
      - logstash_data:/usr/share/logstash/data
    deploy:
      resources:
        limits:
          memory: 1g
    depends_on:
      - elasticsearch
    ports:
      - "9600:9600"
    networks:
      - elk-mail-and-media-shop-v2

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.2
    container_name: elasticsearch
    environment:
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      discovery.type: single-node
      xpack.security.enabled: "false"
    volumes:
      - elastic_search_data:/usr/share/elasticsearch/data
    deploy:
      resources:
        limits:
          memory: 1g
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - elk-mail-and-media-shop-v2

  elasticsearch-setup:
    image: curlimages/curl:8.7.1
    container_name: elasticsearch-setup
    entrypoint:
      - sh
      - -c
      - |
        echo 'Waiting for Elasticsearch...'
        until curl -s -f http://elasticsearch:9200 >/dev/null; do
          sleep 2
        done
        echo 'Elasticsearch is ready. Setting template...'
        curl -s -X PUT "http://elasticsearch:9200/_index_template/app-logs-template" \
          -H "Content-Type: application/json" \
          -d '{
            "index_patterns": ["app-logs-*"],
            "template": {
              "mappings": {
                "properties": {
                  "@timestamp": { "type": "date" },
                  "service": { "type": "keyword" },
                  "correlation_id": { "type": "keyword" },
                  "loglevel": { "type": "keyword" },
                  "logger": { "type": "keyword" },
                  "thread": { "type": "keyword" },
                  "pid": { "type": "integer" },
                  "role": { "type": "keyword" },
                  "api_status_code": { "type": "keyword" },
                  "api_error_message": { "type": "text" },
                  "api_url": { "type": "keyword" },
                  "log_message": { "type": "text" },
                  "message": { "type": "text" }
                }
              }
            }
          }'
        echo 'Template set successfully!'
    networks:
      - elk-mail-and-media-shop-v2
    depends_on:
      - elasticsearch

  kibana:
    image: docker.elastic.co/kibana/kibana:9.4.2
    container_name: kibana
    environment:
      ELASTICSEARCH_HOSTS: '["http://elasticsearch:9200"]'
      NODE_OPTIONS: "--max-old-space-size=1024"
    deploy:
      resources:
        limits:
          memory: 1.5g
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    networks:
      - elk-mail-and-media-shop-v2

volumes:
  shop_db_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonarqube_postgres_data:
  redis_data:
  keycloak-db-data:
  prometheus_data:
  grafana_data:
  loki_data:
  elastic_search_data:
  logstash_data:

networks:
  monitoring:
    driver: bridge
  elk-mail-and-media-shop-v2:
    driver: bridge
