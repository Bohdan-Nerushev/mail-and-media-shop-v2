# E2E Test Profile Configuration
# This profile uses H2 in-memory database to allow tests to run without Docker/PostgreSQL containers.

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Disable Flyway for in-memory E2E tests to simplify setup (using internal initialization/registration)
# Alternatively, you can set it to true if you have migration scripts compatible with H2.
spring.flyway.enabled=false

# Log level for tests
logging.level.dev.mam.buizsol.mamshop=DEBUG
