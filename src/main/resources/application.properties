# Application identity
spring.application.name=mail-and-media-shop

# Embedded server
server.port=8080

# Billing domain configuration

billing.minimal-discount-amount=0.10
billing.zero-amount=0.00

# Spring AOP configuration
# Set to false to use JDK Dynamic Proxies (interface-based) 
# instead of CGLIB (subclass-based) to support 'final' classes.
spring.aop.proxy-target-class=false

springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Logging
logging.level.dev.mam.buizsol.mamshop=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] %-5level %logger{36} - %msg%n

# Database configuration via environment variables
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/shop_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:secret}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true