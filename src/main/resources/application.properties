# Application identity
spring.application.name=mail-and-media-shop

# Embedded server
server.port=8090

# Billing domain configuration

billing.minimal-discount-amount=0.10
billing.zero-amount=0.00

product.catalog.csv-path=/products.csv

# Spring AOP configuration
# Set to false to use JDK Dynamic Proxies (interface-based) 
# instead of CGLIB (subclass-based) to support 'final' classes.
spring.aop.proxy-target-class=false

springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Logging
logging.level.dev.mam.buizsol.mamshop=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] %-5level %logger{36} - %msg%n

# Database configuration via environment variables
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway Advanced Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=false
spring.flyway.clean-on-validation-error=true

# Detailed Logging for Flyway Diagnostics
logging.level.org.flywaydb=DEBUG
logging.level.org.flywaydb.core.internal.scanner=TRACE
logging.level.org.hibernate.SQL=DEBUG

# Hibernate and Initializer Conflict Fixes
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=never
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect



# Redis server connection
spring.redis.host=localhost
spring.redis.port=6379

# Jedis connection pool settings
spring.redis.jedis.pool.max-active=10
spring.redis.jedis.pool.max-idle=5
spring.redis.jedis.pool.min-idle=1
spring.redis.jedis.pool.max-wait=2000

# TTL (default cache expiration)
spring.cache.redis.time-to-live=600000  
spring.cache.redis.cache-null-values=false
