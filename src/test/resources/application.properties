spring.application.name=mail-and-media-shop-test

# Database configuration for tests (using H2 in-memory)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.flyway.enabled=false

# Billing domain configuration
billing.minimal-discount-amount=0.10
billing.zero-amount=0.00

product.catalog.csv-path=/products.csv

logging.level.dev.mam.buizsol.mamshop=WARN
spring.cache.type=none